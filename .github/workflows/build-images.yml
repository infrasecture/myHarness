name: Build Images

on:
  pull_request:
    paths:
      - images/**
      - runtime/**
      - profiles/**
      - Dockerfile
      - docker-compose.yaml
      - build.sh
      - .github/workflows/build-images.yml
  push:
    branches: [main]
    paths:
      - images/**
      - runtime/**
      - profiles/**
      - Dockerfile
      - docker-compose.yaml
      - build.sh
      - .github/workflows/build-images.yml
  workflow_dispatch:
    inputs:
      image:
        description: "Image to build, or all"
        required: true
        default: all

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build selected image set
        run: |
          selected="${{ inputs.image || 'all' }}"
          if [[ "${selected}" == "all" ]]; then
            ./build.sh --images
          elif [[ "${selected}" == "base" ]]; then
            ./build.sh --images --harness base
          else
            HARNESS_IMAGES="base ${selected}" ./build.sh --images
          fi
      - name: Smoke metadata
        run: docker image ls ghcr.io/infrasecture/myharness-* --format '{{.Repository}}:{{.Tag}}'
      - name: Smoke base runtime
        run: docker run --rm -e MYHARNESS_HOST_UID="$(id -u)" -e MYHARNESS_HOST_GID="$(id -g)" ghcr.io/infrasecture/myharness-base:dev id harness
      - name: Smoke harness CLIs
        run: |
          selected="${{ inputs.image || 'all' }}"
          smoke() {
            local image="$1"
            shift
            docker run --rm -e MYHARNESS_HOST_UID="$(id -u)" -e MYHARNESS_HOST_GID="$(id -g)" "ghcr.io/infrasecture/myharness-${image}:dev" "$@"
          }
          if [[ "${selected}" == "all" || "${selected}" == "codex" ]]; then
            smoke codex codex --version
          fi
          if [[ "${selected}" == "all" || "${selected}" == "claude" ]]; then
            smoke claude claude --version
          fi
          if [[ "${selected}" == "all" || "${selected}" == "opencode" ]]; then
            smoke opencode opencode --version
          fi
          if [[ "${selected}" == "all" || "${selected}" == "hermes" ]]; then
            smoke hermes hermes --version
          fi
      - name: Smoke myHarness Compose startup
        run: |
          selected="${{ inputs.image || 'all' }}"
          ./build.sh --cli
          smoke_runtime() {
            local harness="$1"
            local marker="e2e-${harness}"
            rm -f "${marker}"
            ./dist/myharness-local --harness "${harness}" --image "ghcr.io/infrasecture/myharness-${harness}:dev" --workspace "$PWD" --private-env --harness-state start
            ./dist/myharness-local --harness "${harness}" --image "ghcr.io/infrasecture/myharness-${harness}:dev" --workspace "$PWD" --private-env --harness-state exec pgrep -u harness tmux
            if [[ "${harness}" == "codex" ]]; then
              ./dist/myharness-local --harness "${harness}" --image "ghcr.io/infrasecture/myharness-${harness}:dev" --workspace "$PWD" --private-env --harness-state exec test "$(./dist/myharness-local --harness "${harness}" --image "ghcr.io/infrasecture/myharness-${harness}:dev" --workspace "$PWD" --private-env --harness-state exec stat -c '%U:%a' /home/myharness/.codex/config.toml)" = "harness:600"
            fi
            if [[ "${harness}" == "claude" ]]; then
              ./dist/myharness-local --harness "${harness}" --image "ghcr.io/infrasecture/myharness-${harness}:dev" --workspace "$PWD" --private-env --harness-state exec test "$(./dist/myharness-local --harness "${harness}" --image "ghcr.io/infrasecture/myharness-${harness}:dev" --workspace "$PWD" --private-env --harness-state exec stat -c '%U:%a' /home/myharness/.claude/settings.json)" = "harness:600"
            fi
            ./dist/myharness-local --harness "${harness}" --image "ghcr.io/infrasecture/myharness-${harness}:dev" --workspace "$PWD" --private-env --harness-state exec runuser -u harness -- touch "/workspace/${marker}"
            test -f "${marker}"
            test "$(stat -c '%u:%g' "${marker}")" = "$(id -u):$(id -g)"
            ./dist/myharness-local --harness "${harness}" --image "ghcr.io/infrasecture/myharness-${harness}:dev" --workspace "$PWD" --private-env --harness-state down -v
          }
          if [[ "${selected}" == "all" || "${selected}" == "codex" ]]; then
            smoke_runtime codex
          fi
          if [[ "${selected}" == "all" || "${selected}" == "claude" ]]; then
            smoke_runtime claude
          fi
