name: Build Images

on:
  pull_request:
    paths:
      - images/**
      - runtime/**
      - profiles/**
      - Dockerfile
      - docker-compose.yaml
      - build.sh
      - .github/workflows/build-images.yml
  push:
    branches: [main]
    paths:
      - images/**
      - runtime/**
      - profiles/**
      - Dockerfile
      - docker-compose.yaml
      - build.sh
      - .github/workflows/build-images.yml
  workflow_dispatch:
    inputs:
      image:
        description: "Image to build, or all"
        required: true
        default: all

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build selected image set
        run: |
          selected="${{ inputs.image || 'all' }}"
          if [[ "${selected}" == "all" ]]; then
            ./build.sh --images
          elif [[ "${selected}" == "base" ]]; then
            ./build.sh --images --harness base
          else
            HARNESS_IMAGES="base ${selected}" ./build.sh --images
          fi
      - name: Smoke metadata
        run: docker image ls ghcr.io/infrasecture/myharness-* --format '{{.Repository}}:{{.Tag}}'
