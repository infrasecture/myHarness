name: Build Images

on:
  pull_request:
    paths:
      - images/**
      - runtime/**
      - profiles/**
      - Dockerfile
      - docker-compose.yaml
      - .github/workflows/build-images.yml
  push:
    branches: [main]
    paths:
      - images/**
      - runtime/**
      - profiles/**
      - Dockerfile
      - docker-compose.yaml
      - .github/workflows/build-images.yml
  workflow_dispatch:
    inputs:
      image:
        description: "Image to build, or all"
        required: true
        default: all
      push:
        description: "Push built images"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [base, codex, claude, opencode, hermes, all]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'workflow_dispatch' && inputs.push
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Select image
        id: select
        run: |
          selected="${{ inputs.image || 'all' }}"
          if [[ "${selected}" == "all" || "${selected}" == "${{ matrix.image }}" ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build image
        if: steps.select.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/${{ matrix.image }}/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'workflow_dispatch' && inputs.push }}
          tags: ghcr.io/infrasecture/myharness-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke metadata
        if: steps.select.outputs.build == 'true'
        run: test -f images/${{ matrix.image }}/Dockerfile
