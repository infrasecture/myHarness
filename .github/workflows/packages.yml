name: Packages

on:
  workflow_dispatch:
  pull_request:
    paths:
      - build.sh
      - packaging/**
      - cmd/**
      - internal/**

permissions:
  contents: read

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install nfpm
        uses: goreleaser/nfpm-action@v2
      - name: Build packages
        run: VERSION=v0.0.0 ./build.sh --cli --packages
