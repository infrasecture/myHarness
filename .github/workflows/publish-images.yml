name: Publish Images

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - codex_version_released
      - claude_version_released
      - opencode_version_released
      - hermes_version_released

permissions:
  contents: read
  packages: write

jobs:
  base:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        run: |
          tag="${GITHUB_REF_NAME:-manual-${GITHUB_SHA::12}}"
          echo "version=${tag}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - name: Build and push base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/infrasecture/myharness-base:${{ steps.meta.outputs.version }}
            ghcr.io/infrasecture/myharness-base:${{ steps.meta.outputs.sha }}
            ghcr.io/infrasecture/myharness-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  variants:
    needs: base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [codex, claude, opencode, hermes, all]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push variant
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/${{ matrix.image }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_IMAGE=ghcr.io/infrasecture/myharness-base:${{ needs.base.outputs.version }}
          tags: |
            ghcr.io/infrasecture/myharness-${{ matrix.image }}:${{ needs.base.outputs.version }}
            ghcr.io/infrasecture/myharness-${{ matrix.image }}:${{ needs.base.outputs.sha }}
            ghcr.io/infrasecture/myharness-${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
