apiVersion: myharness.infrasecture.io/v1alpha1
kind: HarnessProfile
name: claude
displayName: myClaude
image: ghcr.io/infrasecture/myharness-claude:latest
defaultCommand: byobu
defaultSession: claude
homeDirs:
  - /home/myharness/.claude
environment:
  CLAUDE_CONFIG_DIR: /home/myharness/.claude
config:
  files:
    - path: /home/myharness/.claude/settings.json
      mode: "0600"
      content: |
        {
          "$schema": "https://json.schemastore.org/claude-code-settings.json",
          "permissions": {
            "defaultMode": "bypassPermissions",
            "skipDangerousModePermissionPrompt": true
          }
        }
healthcheck: runuser -u harness -- byobu-tmux has-session -t "$${MYHARNESS_SESSION:-claude}" >/dev/null 2>&1
banner: "Run Claude Code with: claude"
vakaPolicyTemplate: examples/vaka.yaml
vakaAllowedHosts:
  - api.anthropic.com
  - claude.ai
  - platform.claude.com
  - downloads.claude.ai
  - storage.googleapis.com
  - api.github.com
  - github.com
versionResolver:
  type: npm
  package: "@anthropic-ai/claude-code"
